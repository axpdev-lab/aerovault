<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="450" viewBox="0 0 1040 450" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="sib" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="1040" height="450" fill="#ffffff"/>

  <text x="36" y="48" font-size="24" font-weight="700" fill="#0f172a">Parity placement: your choice</text>
  <text x="36" y="76" font-size="15" fill="#475569">v4 is just v3 plus a detached parity sibling, by default. Embedded and both are there too, for whoever wants them.</text>
  <line x1="36" y1="96" x2="1004" y2="96" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ROW 1 detached -->
  <text x="36" y="150" font-size="19" font-weight="700" fill="#0f172a">detached</text>
  <rect x="138" y="135" width="74" height="22" rx="11" fill="#d1fae5" stroke="#10b981" stroke-width="1.2"/>
  <text x="175" y="151" font-size="12.5" font-weight="700" fill="#047857" text-anchor="middle">default</text>
  <text x="36" y="178" font-size="14" fill="#475569">The .aerovault stays byte-identical to a plain v3.</text>
  <text x="36" y="198" font-size="14" fill="#475569">Parity lives in the sibling. The storage view stays clean.</text>
  <!-- visual -->
  <rect x="470" y="138" width="320" height="58" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.6"/>
  <text x="630" y="166" font-size="15" font-weight="700" fill="#334155" text-anchor="middle">.aerovault</text>
  <text x="630" y="184" font-size="11" fill="#64748b" text-anchor="middle">plain v3 container, no parity inside</text>
  <line x1="790" y1="167" x2="846" y2="167" stroke="#10b981" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#sib)"/>
  <text x="818" y="158" font-size="10.5" fill="#059669" text-anchor="middle">sibling</text>
  <rect x="850" y="138" width="154" height="58" rx="9" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
  <text x="927" y="166" font-size="14" font-weight="700" fill="#047857" text-anchor="middle">.aerocorrect</text>
  <text x="927" y="184" font-size="10.5" fill="#059669" text-anchor="middle">parity</text>

  <!-- ROW 2 embedded -->
  <text x="36" y="262" font-size="19" font-weight="700" fill="#0f172a">embedded</text>
  <text x="36" y="290" font-size="14" fill="#475569">Parity is a non-critical extension inside the .aerovault,</text>
  <text x="36" y="310" font-size="14" fill="#475569">auto-refreshed on every seal. A v3 reader just ignores it.</text>
  <!-- visual: container with EC tail -->
  <rect x="470" y="250" width="320" height="58" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.6"/>
  <path d="M698 250 h84 a9 9 0 0 1 9 9 v40 a9 9 0 0 1 -9 9 h-84 Z" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
  <line x1="698" y1="250" x2="698" y2="308" stroke="#10b981" stroke-width="1.4"/>
  <text x="594" y="284" font-size="15" font-weight="700" fill="#334155" text-anchor="middle">.aerovault</text>
  <text x="740" y="276" font-size="13" font-weight="700" fill="#047857" text-anchor="middle">EC</text>
  <text x="740" y="293" font-size="9.5" fill="#059669" text-anchor="middle">parity</text>
  <text x="594" y="302" font-size="10.5" fill="#64748b" text-anchor="middle">container grows a little</text>

  <!-- ROW 3 both -->
  <text x="36" y="374" font-size="19" font-weight="700" fill="#0f172a">both</text>
  <text x="36" y="402" font-size="14" fill="#475569">Embed and also write the sibling: two independent</text>
  <text x="36" y="422" font-size="14" fill="#475569">recovery locations, detached-first.</text>
  <!-- visual: container with EC tail + sibling -->
  <rect x="470" y="362" width="300" height="58" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.6"/>
  <path d="M686 362 h75 a9 9 0 0 1 9 9 v40 a9 9 0 0 1 -9 9 h-75 Z" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
  <line x1="686" y1="362" x2="686" y2="420" stroke="#10b981" stroke-width="1.4"/>
  <text x="578" y="396" font-size="15" font-weight="700" fill="#334155" text-anchor="middle">.aerovault</text>
  <text x="723" y="389" font-size="12.5" font-weight="700" fill="#047857" text-anchor="middle">EC</text>
  <text x="723" y="405" font-size="9" fill="#059669" text-anchor="middle">parity</text>
  <line x1="770" y1="391" x2="846" y2="391" stroke="#10b981" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#sib)"/>
  <text x="808" y="382" font-size="10.5" fill="#059669" text-anchor="middle">sibling</text>
  <rect x="850" y="362" width="154" height="58" rx="9" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
  <text x="927" y="390" font-size="14" font-weight="700" fill="#047857" text-anchor="middle">.aerocorrect</text>
  <text x="927" y="408" font-size="10.5" fill="#059669" text-anchor="middle">parity</text>
</svg>
