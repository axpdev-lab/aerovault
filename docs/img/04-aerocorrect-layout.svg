<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" font-family="ui-sans-serif,system-ui,sans-serif">
  <rect width="720" height="360" fill="#ffffff"/>
  <text x="360" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">.aerocorrect v2 sidecar layout</text>
  <text x="360" y="56" text-anchor="middle" font-size="12.5" fill="#475569">The locator is tiny and stored in triplicate with per-copy checksums, so a lightly corrupted sidecar still recovers.</text>

  <!-- prefix -->
  <rect x="40" y="86" width="640" height="38" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="360" y="110" text-anchor="middle" font-size="13" fill="#0c4a6e">prefix: magic "AEROCORR" (8) | version=2 (1) | segment_count x3 (12)</text>

  <!-- directory copies -->
  <g>
    <rect x="40" y="138" width="640" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="360" y="160" text-anchor="middle" font-size="12.5" fill="#14532d">directory copy 1 (locator) + blake3(copy1) checksum (32)</text>
    <rect x="40" y="176" width="640" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="360" y="198" text-anchor="middle" font-size="12.5" fill="#14532d">directory copy 2 (locator) + blake3(copy2) checksum (32)</text>
    <rect x="40" y="214" width="640" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="360" y="236" text-anchor="middle" font-size="12.5" fill="#14532d">directory copy 3 (locator) + blake3(copy3) checksum (32)</text>
  </g>
  <text x="360" y="268" text-anchor="middle" font-size="11.5" fill="#475569" font-style="italic">each copy: total_len | binding_id | content_sha256 | per-segment {offset, len, avec_len, geometry header copy}</text>

  <!-- parity region -->
  <rect x="40" y="284" width="640" height="48" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="360" y="305" text-anchor="middle" font-size="13" fill="#78350f">parity region: every segment's AVEC Reed-Solomon payload, concatenated in segment order</text>
  <text x="360" y="323" text-anchor="middle" font-size="11.5" fill="#92400e">no wholesale checksum: each shard self-checks, so a rotted shard is an RS erasure routed around at repair</text>
</svg>
