<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="510" viewBox="0 0 1040 510" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="dn" markerWidth="9" markerHeight="9" refX="3" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,0 L3,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1040" height="510" fill="#ffffff"/>

  <text x="36" y="48" font-size="24" font-weight="700" fill="#0f172a">Recovery: file only, versus file and sidecar</text>
  <text x="36" y="76" font-size="15" fill="#475569">A lightly damaged .aerocorrect self-heals and still recovers; only losing it past its own budget loses the recovery, like par2.</text>
  <line x1="520" y1="104" x2="520" y2="436" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ===== LEFT: only the vault is hit ===== -->
  <text x="270" y="130" font-size="17" font-weight="700" fill="#0f172a" text-anchor="middle">Only the .aerovault is hit</text>
  <!-- state -->
  <rect x="60" y="146" width="206" height="50" rx="9" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="163" y="170" font-size="14" font-weight="700" fill="#b45309" text-anchor="middle">.aerovault</text>
  <text x="163" y="187" font-size="11" fill="#d97706" text-anchor="middle">damaged</text>
  <rect x="274" y="146" width="200" height="50" rx="9" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
  <text x="374" y="170" font-size="14" font-weight="700" fill="#047857" text-anchor="middle">.aerocorrect</text>
  <text x="374" y="187" font-size="11" fill="#059669" text-anchor="middle">intact</text>

  <line x1="270" y1="198" x2="270" y2="220" stroke="#94a3b8" stroke-width="2" marker-end="url(#dn)"/>
  <rect x="50" y="222" width="440" height="50" rx="9" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="270" y="252" font-size="14" fill="#334155" text-anchor="middle">Reconstruct the damaged region from the intact parity</text>

  <line x1="270" y1="274" x2="270" y2="296" stroke="#94a3b8" stroke-width="2" marker-end="url(#dn)"/>
  <rect x="50" y="298" width="440" height="50" rx="9" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="270" y="328" font-size="14" fill="#334155" text-anchor="middle">Re-verify rebuilt bytes vs authenticated cipher_hash / MAC</text>

  <line x1="270" y1="350" x2="270" y2="372" stroke="#94a3b8" stroke-width="2" marker-end="url(#dn)"/>
  <rect x="50" y="374" width="440" height="58" rx="9" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.2"/>
  <text x="270" y="400" font-size="16" font-weight="700" fill="#15803d" text-anchor="middle">RECOVERED</text>
  <text x="270" y="419" font-size="12" fill="#16a34a" text-anchor="middle">exact original bytes restored, up to the parity budget</text>

  <!-- ===== RIGHT: the file AND a lightly-damaged sidecar ===== -->
  <text x="772" y="130" font-size="17" font-weight="700" fill="#0f172a" text-anchor="middle">The .aerovault and its sidecar are both hit</text>
  <rect x="560" y="146" width="206" height="50" rx="9" fill="#fef2f2" stroke="#ef4444" stroke-width="1.8"/>
  <text x="663" y="170" font-size="14" font-weight="700" fill="#b91c1c" text-anchor="middle">.aerovault</text>
  <text x="663" y="187" font-size="11" fill="#dc2626" text-anchor="middle">damaged</text>
  <rect x="774" y="146" width="206" height="50" rx="9" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="877" y="170" font-size="14" font-weight="700" fill="#b45309" text-anchor="middle">.aerocorrect</text>
  <text x="877" y="187" font-size="11" fill="#d97706" text-anchor="middle">lightly damaged</text>

  <line x1="772" y1="198" x2="772" y2="220" stroke="#94a3b8" stroke-width="2" marker-end="url(#dn)"/>
  <rect x="552" y="222" width="440" height="50" rx="9" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
  <text x="772" y="244" font-size="13" font-weight="600" fill="#047857" text-anchor="middle">The .aerocorrect self-heals first: its replicated locator</text>
  <text x="772" y="262" font-size="13" font-weight="600" fill="#047857" text-anchor="middle">is repaired and rotted parity shards are routed around</text>

  <line x1="772" y1="274" x2="772" y2="296" stroke="#94a3b8" stroke-width="2" marker-end="url(#dn)"/>
  <rect x="552" y="298" width="440" height="50" rx="9" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="772" y="328" font-size="13.5" fill="#334155" text-anchor="middle">Reconstruct, then re-verify vs cipher_hash / MAC</text>

  <line x1="772" y1="350" x2="772" y2="372" stroke="#94a3b8" stroke-width="2" marker-end="url(#dn)"/>
  <rect x="552" y="374" width="440" height="58" rx="9" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.2"/>
  <text x="772" y="400" font-size="16" font-weight="700" fill="#15803d" text-anchor="middle">RECOVERED</text>
  <text x="772" y="419" font-size="12" fill="#16a34a" text-anchor="middle">self-healed within the parity budget</text>

  <!-- ===== beyond-budget caveat, spanning both columns ===== -->
  <rect x="50" y="452" width="942" height="42" rx="9" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="521" y="471" font-size="13" font-weight="700" fill="#b45309" text-anchor="middle">Beyond the budget (the sidecar damaged past self-heal, or a window hit harder than its RS parity):</text>
  <text x="521" y="487" font-size="12.5" font-weight="600" fill="#15803d" text-anchor="middle">the both placement falls back to the embedded copy, otherwise the original is left byte-for-byte untouched, never a wrong overwrite.</text>
</svg>
