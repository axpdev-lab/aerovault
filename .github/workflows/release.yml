name: Release

# Build prebuilt `aerovault` CLI binaries for Linux and Windows and attach them
# to the GitHub Release. Source distribution stays on crates.io (`cargo install
# aerovault-cli`); this workflow serves users who want a ready-to-run executable.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build a release for (e.g. v0.5.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: aerovault-x86_64-linux
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: aerovault-x86_64-windows
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --release -p aerovault-cli --target ${{ matrix.target }}

      - name: Package (Linux)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/aerovault" dist/aerovault
          cp README.md CHANGELOG.md LICENSE dist/ 2>/dev/null || true
          tar -C dist -czf "${{ matrix.asset }}.tar.gz" .
          sha256sum "${{ matrix.asset }}.tar.gz" > "${{ matrix.asset }}.tar.gz.sha256"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/aerovault.exe" dist/aerovault.exe
          Copy-Item README.md, CHANGELOG.md, LICENSE dist/ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist/* -DestinationPath "${{ matrix.asset }}.zip" -Force
          (Get-FileHash "${{ matrix.asset }}.zip" -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.asset }}.zip" | Out-File -Encoding ascii "${{ matrix.asset }}.zip.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}.${{ matrix.archive }}
            ${{ matrix.asset }}.${{ matrix.archive }}.sha256

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          # Extract the matching CHANGELOG section.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > section.md
          # Reflow soft-wrapped lines into single-line bullets/paragraphs, because
          # GitHub renders every single newline as a <br>, which would otherwise
          # break sentences mid-line. Blank lines and headings stay as separators.
          awk '
            /^[[:space:]]*$/ { if (buf != "") { print buf; buf="" } print ""; next }
            /^#/             { if (buf != "") { print buf; buf="" } print $0; next }
            /^[-*] /         { if (buf != "") print buf; buf=$0; next }
            { sub(/^[[:space:]]+/, ""); if (buf == "") buf=$0; else buf=buf " " $0 }
            END { if (buf != "") print buf }
          ' section.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Prebuilt aerovault CLI binaries for $TAG." > release-notes.md
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: aerovault ${{ github.event.inputs.tag || github.ref_name }}
          body_path: release-notes.md
          files: artifacts/*
          fail_on_unmatched_files: true
